[mypy]
strict = true
ignore_missing_imports = true
warn_unreachable = true
disallow_untyped_defs = true


# -- Per-file Exclusions --
# The engine.py file is complex and has issues with library stubs.
# Exclude it from checks for now to allow the rest of the project to be typed.
# _make_request returns Any from response.json(); public method signatures are correct.
[mypy-src.clients.zammad_client]
warn_return_any = False

# DP-244: engine.py became the src/engine/ package. The whole package is typed
# and strict-checked — including driver.py (the policy core), which silences its
# lone google-genai client annotation with a targeted `# type: ignore` rather
# than a whole-file ignore. EXCEPT two modules that inherited legacy SDK/stdlib
# stub noise too dense to annotate around: providers/google.py (google-genai
# stubs — Part(**dict), Candidate chains, genai.client) and
# providers/_subprocess.py (the POSIX-only process-group kill path — os.killpg /
# os.getpgid / signal.SIGKILL / start_new_session — trips the Windows-typed
# os/signal stubs).
[mypy-src.engine.providers.google]
ignore_errors = True

[mypy-src.engine.providers._subprocess]
ignore_errors = True

# The gmail_bot.py file has complex interactions with Google's API client library.
# Exclude it from checks for now.
[mypy-src.interfaces.gmail_bot]
ignore_errors = True

# DP-249: src/voice/capture.py lazily touches the optional discord-ext-voice-recv
# dep, which is installed in dev/prod but NOT in CI. mypy resolves the
# voice_recv import differently per env, so the file needs BOTH
# `# type: ignore[attr-defined]` (CI: voice_recv unresolved) and
# `# type: ignore[method-assign]` (local: PacketDecoder is a real type) — and
# whichever ignore the current env doesn't need would otherwise trip
# warn_unused_ignores (on via strict=true). Disabling it here lets the file pass
# in both environments. See bugfix/DP-249.
[mypy-src.voice.capture]
warn_unused_ignores = False