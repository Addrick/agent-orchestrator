[mypy]
strict = true
ignore_missing_imports = true
warn_unreachable = true
disallow_untyped_defs = true


# -- Per-file Exclusions --
# The engine.py file is complex and has issues with library stubs.
# Exclude it from checks for now to allow the rest of the project to be typed.
# _make_request returns Any from response.json(); public method signatures are correct.
[mypy-src.clients.zammad_client]
warn_return_any = False

# DP-244: engine.py became the src/engine/ package. driver.py retains the
# google-genai client annotation noise (genai.client.AsyncClient). The new
# Provider ABC / registry / providers modules ARE typed and checked strictly —
# EXCEPT two that inherited legacy SDK/stdlib stub noise when their logic moved
# out of driver.py: providers/google.py (google-genai stubs — Part(**dict),
# Candidate chains, genai.client) and providers/_subprocess.py (the POSIX-only
# process-group kill path — os.killpg / os.getpgid / signal.SIGKILL /
# start_new_session — trips the Windows-typed os/signal stubs).
[mypy-src.engine.driver]
ignore_errors = True

[mypy-src.engine.providers.google]
ignore_errors = True

[mypy-src.engine.providers._subprocess]
ignore_errors = True

# The gmail_bot.py file has complex interactions with Google's API client library.
# Exclude it from checks for now.
[mypy-src.interfaces.gmail_bot]
ignore_errors = True