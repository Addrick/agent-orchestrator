# nginx LB for the Granite extraction-LLM pool (port 5002).
#
# Mirrors the prod kobold-lb.conf (:5001) pattern but for the granite sweep
# stack. Runs as service `granite-proxy` inside hindsight-granite-net; the
# hindsight-granite container points HINDSIGHT_API_LLM_BASE_URL at
# http://granite-proxy:5002/v1. Upstreams are LAN kcpp workers (egress works
# because the granite net is a non-internal bridge).
#
# Edit pool: change the upstream block, then:
#   docker exec hindsight-granite-proxy nginx -t \
#     && docker exec hindsight-granite-proxy nginx -s reload
# No container restart needed.

upstream granite_kcpp {
    least_conn;
    # .69 re-enabled 2026-05-24 (kcpp recovered).
    server 10.0.0.69:5002 max_fails=3 fail_timeout=30s;
    server 10.0.0.67:5002 max_fails=3 fail_timeout=30s;
}

server {
    listen 5002;

    location / {
        proxy_pass http://granite_kcpp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # Granite-8B retain on llama-server runs 100-275s/call; HS LLM timeout
        # is 600s (GRANITE_LLM_TIMEOUT). Outlast it so nginx never cuts first.
        proxy_connect_timeout 10s;
        proxy_send_timeout 700s;
        proxy_read_timeout 700s;
    }
}
