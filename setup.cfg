[pydeps]
cluster = True
max_module_depth = 2
no_show = True
output = docs/architecture.svg
format = svg
only =
    src.engine
    src.chat_system
    src.message_handler
    src.persona
    src.tools
    src.memory
    src.clients
    src.interfaces
    src.main

[importlinter]
root_packages =
    src
    config
include_external_packages = False

[importlinter:contract:architecture-layers]
name = Application layer boundaries
type = layers
layers =
    src.interfaces
    src.chat_system
    src.message_handler
    src.engine
    src.tools
    src.memory
    src.clients
    src.persona
    config
ignore_imports =
    src.message_handler -> src.chat_system

[importlinter:contract:interface-independence]
name = Bot interfaces must not import each other
type = independence
modules =
    src.interfaces.discord_bot
    src.interfaces.gmail_bot
    src.interfaces.zammad_bot
