[pytest]
pythonpath = src .
testpaths = tests
env =
    DATABASE_FILE=:memory:

markers =
    integration: Multi-component tests with mocked external services.
    zammad_live: Requires a live Zammad instance.
    llm_live: Requires LLM API keys; makes real API calls.
    slow: Notably slower tests.

order_scope = session
order_groups =
    not slow and not integration and not zammad_live and not llm_live
    slow
    integration
    zammad_live
    llm_live
