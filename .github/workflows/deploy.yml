# .github/workflows/deploy.yml

name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Use your actual image name here
  IMAGE_NAME: ghcr.io/addrick/derpr-python
  # NOTE: secrets MUST NOT live at workflow-level env — that injects them into the
  # `test` job, which runs on every pull_request. Same-repo-branch PRs receive full
  # secrets (only forks are withheld), so a PR could exfiltrate them via test code.
  # CI runs `-m "not integration"` + llm_live auto-skips, so no provider key is
  # needed here. If a job ever needs one, scope it to that step, never globally.
  # (DP-229; see memory codebase/ci-pr-secret-exposure.)

jobs:
  # JOB 1: Run Tests and Static Analysis
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors, undefined names, or bad imports
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Check for missing dependencies
        run: python scripts/check_missing_deps.py
      - name: Type check with mypy
        run: mypy src/ --config-file mypy.ini

      - name: Run tests with pytest, skipping integration.
        run: pytest -n auto -m "not integration"

  # JOB 2: Build & Push Docker Image
  # Only runs if 'test' passes and we are pushing to main (not PRs)
  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # JOB 3: Deploy to self-hosted runner on CT100 (.70 — Proxmox LXC, Linux)
  # Only runs if build-and-push succeeds.
  #
  # Post-cutover (2026-06-23) .70 is a Linux LXC, not the old Windows AUX-DESKTOP
  # box, so the runner + steps are bash/compose, not PowerShell/docker-run. Prod
  # is now defined by the compose file at $DEPLOY_DIR (source of truth, captured
  # from the live containers during the migration). The deploy just pulls the
  # fresh image and re-ups the chatbot service from that compose file. All env
  # (Discord/provider keys, GH_TOKEN, CC_*, VOICE_*), the 3 named volumes
  # (derpr_data / derpr_agy_home / derpr_cc_home), the 5004:5003 port map, and
  # security_opt seccomp=unconfined (cc-* bubblewrap sandbox) live in
  # docker-compose.yml + ./.env there — NOT in this workflow.
  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Linux, derpr]
    permissions:
      packages: read
    env:
      DEPLOY_DIR: /opt/configs/derpr
      SERVICE: chatbot

    steps:
      - name: Log in to GHCR
        # Refresh GHCR auth each run so a rotated/expired host login can't block
        # the pull. GITHUB_TOKEN is auto-scoped to this repo's packages (read).
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull new image
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose pull ${{ env.SERVICE }}

      - name: Recreate chatbot from compose
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose up -d ${{ env.SERVICE }}

      - name: Prune unused images
        run: docker image prune -f

