# .github/workflows/deploy.yml

name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  # Use your actual image name here
  IMAGE_NAME: ghcr.io/addrick/derpr-python
  GOOGLE_GENERATIVEAI_API_KEY: ${{secrets.GOOGLE_GENERATIVEAI_API_KEY}}

jobs:
  # JOB 1: Run Tests and Static Analysis
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors, undefined names, or bad imports
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Type check with mypy
        run: mypy src/ --config-file mypy.ini

      - name: Run tests with pytest, skipping integration.
        run: pytest -m "not integration"

  # JOB 2: Build & Push Docker Image
  # Only runs if 'test' passes and we are pushing to main (not PRs)
  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # JOB 3: Deploy to AWS
  # Only runs if build-and-push succeeds
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Log into the registry on the server
            # We pass the PAT specifically to ensure the server has pull rights
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # 2. Pull the new image
            docker pull ${{ env.IMAGE_NAME }}:latest
            # 3. Stop and remove the old container
            # '|| true' prevents the script from crashing if the container is already stopped
            docker stop chatbot || true
            docker rm chatbot || true
            
            # --- SECURITY ADDITIONS ---
            # 4a. Lock down the .env file so only the 'ubuntu' user can read it
            chmod 600 .env || true
            
            # 4b. Ensure the data directory exists and is owned by UID 1000 
            # (Matches the non-root user we configure in the Dockerfile)
            mkdir -p /home/ubuntu/data
            sudo chown -R 1000:1000 /home/ubuntu/data
            # --------------------------

            # 5. Run the new container
            # We reuse the .env file already sitting on the server
            docker run -d \
              --name chatbot \
              --restart unless-stopped \
              --env-file .env \
              -v /home/ubuntu/data:/app/data \
              ${{ env.IMAGE_NAME }}:latest
            
            # 6. Cleanup unused images to save disk space on the micro instance
            docker image prune -f
            
