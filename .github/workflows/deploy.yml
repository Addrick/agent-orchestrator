# .github/workflows/deploy.yml

name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Use your actual image name here
  IMAGE_NAME: ghcr.io/addrick/derpr-python
  # NOTE: secrets MUST NOT live at workflow-level env — that injects them into the
  # `test` job, which runs on every pull_request. Same-repo-branch PRs receive full
  # secrets (only forks are withheld), so a PR could exfiltrate them via test code.
  # CI runs `-m "not integration"` + llm_live auto-skips, so no provider key is
  # needed here. If a job ever needs one, scope it to that step, never globally.
  # (DP-229; see memory codebase/ci-pr-secret-exposure.)

jobs:
  # JOB 1: Run Tests and Static Analysis
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors, undefined names, or bad imports
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other issues as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Check for missing dependencies
        run: python scripts/check_missing_deps.py
      - name: Type check with mypy
        run: mypy src/ --config-file mypy.ini

      - name: Run tests with pytest, skipping integration.
        run: pytest -n auto -m "not integration"

  # JOB 2: Build & Push Docker Image
  # Only runs if 'test' passes and we are pushing to main (not PRs)
  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # JOB 3: Deploy to self-hosted runner on .70 (AUX-DESKTOP)
  # Only runs if build-and-push succeeds
  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Windows, derpr]
    permissions:
      packages: read
    env:
      DOCKER_CONFIG: C:\Server\derpr\.docker
      ENV_FILE: C:\Server\derpr\.env
      DATA_VOLUME: derpr_data
      # agy keeps OAuth tokens + workspace cache under ~/.gemini; without this
      # volume every deploy wipes them and the agy route needs a re-login.
      AGY_HOME_VOLUME: derpr_agy_home
      # Claude Code (cc-*) caches its config/state under ~/.claude. Cache-only
      # (auth is the CLAUDE_CODE_OAUTH_TOKEN env var, not this volume), but
      # persisting it avoids re-priming on every deploy.
      CC_HOME_VOLUME: derpr_cc_home
      CONTAINER_NAME: chatbot

    steps:
      - name: Log in to GHCR
        shell: powershell
        run: |
          # Write GHCR auth into our pinned docker config dir, bypassing wincred
          # (wincred fails for non-interactive sessions; see C:\Server\derpr\.docker\config.json)
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"))
          $cfg = @{
            auths = @{ "ghcr.io" = @{ auth = $auth } }
            credHelpers = @{ "ghcr.io" = ""; "docker.io" = ""; "index.docker.io" = ""; "registry-1.docker.io" = "" }
          } | ConvertTo-Json -Compress -Depth 4
          New-Item -ItemType Directory -Path $env:DOCKER_CONFIG -Force | Out-Null
          [System.IO.File]::WriteAllText("$env:DOCKER_CONFIG\config.json", $cfg)

      - name: Pull new image
        shell: powershell
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Stop and remove old container
        shell: powershell
        run: |
          docker stop $env:CONTAINER_NAME 2>$null
          docker rm   $env:CONTAINER_NAME 2>$null
          exit 0   # ignore failures if container absent

      - name: Run new container
        shell: powershell
        run: |
          # cc-* (Claude Code) sandbox notes:
          # - seccomp=unconfined: bubblewrap needs user-namespace syscalls that
          #   Docker's default seccomp profile blocks in an unprivileged container.
          # - CC_SANDBOX_WEAKER_NESTED=True: bind-mount the container's existing
          #   /proc (can't mount a fresh one unprivileged). The container is Linux
          #   (WSL2 backend) so bubblewrap works even though the host is Windows.
          # - CLAUDE_CODE_OAUTH_TOKEN must be present in $ENV_FILE (.env) — a
          #   1-year token from `claude setup-token`, set ONCE on a browser
          #   machine. Without it cc-* auth fails; other personas still serve.
          docker run -d `
            --name $env:CONTAINER_NAME `
            --restart unless-stopped `
            --env-file $env:ENV_FILE `
            --security-opt seccomp=unconfined `
            -e CC_SANDBOX=True `
            -e CC_SANDBOX_WEAKER_NESTED=True `
            -e CC_WORKSPACE_MODE=persona `
            -e GH_TOKEN=${{ secrets.SELF_EDIT_REQUESTS }} `
            -e CC_FIXR_REPO_URL=https://github.com/Addrick/agent-orchestrator.git `
            -e CC_FIXR_MODEL_ARG=haiku `
            -v "${env:DATA_VOLUME}:/app/data" `
            -v "${env:AGY_HOME_VOLUME}:/home/botuser/.gemini" `
            -v "${env:CC_HOME_VOLUME}:/home/botuser/.claude" `
            -p 5003:5003 `
            ${{ env.IMAGE_NAME }}:latest

      - name: Prune unused images
        shell: powershell
        run: docker image prune -f

